<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yor.iAPP - Login E-Arsip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-pattern { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-slate-50 bg-pattern min-h-screen flex flex-col justify-between font-sans text-slate-800">

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden fade-in relative">
            <div class="bg-blue-600 p-6 text-center text-white">
                <i class="fas fa-folder-open text-4xl mb-2 animate-bounce"></i>
                <h1 class="text-2xl font-bold tracking-wider">Yor.iAPP</h1>
                <p class="text-blue-100 text-sm">Sistem E-Arsip Digital</p>
            </div>

            <div class="p-8">
                <!-- Loader -->
                <div id="loader" class="hidden absolute inset-0 bg-white/80 z-10 flex flex-col items-center justify-center">
                    <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-2 text-sm font-medium text-slate-600" id="loaderText">Memproses...</p>
                </div>

                <!-- Login Form -->
                <div id="loginFormContainer" class="block">
                    <h2 class="text-xl font-semibold mb-6 text-center">Masuk ke Akun</h2>
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-1">Email</label>
                            <div class="relative">
                                <i class="fas fa-envelope absolute left-3 top-3 text-slate-400"></i>
                                <input type="email" id="logEmail" required class="w-full pl-10 pr-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                            </div>
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium mb-1">Password</label>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-3 top-3 text-slate-400"></i>
                                <input type="password" id="logPassword" required class="w-full pl-10 pr-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors">
                            Masuk
                        </button>
                    </form>
                    <p class="mt-6 text-center text-sm">
                        Belum punya akun? <button onclick="toggleForm('register')" class="text-blue-600 font-semibold hover:underline">Daftar sekarang</button>
                    </p>
                </div>

                <!-- Register Form -->
                <div id="registerFormContainer" class="hidden">
                    <h2 class="text-xl font-semibold mb-6 text-center">Buat Akun Baru</h2>
                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-1">Username</label>
                            <div class="relative">
                                <i class="fas fa-user absolute left-3 top-3 text-slate-400"></i>
                                <input type="text" id="regUsername" required class="w-full pl-10 pr-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-1">Email</label>
                            <div class="relative">
                                <i class="fas fa-envelope absolute left-3 top-3 text-slate-400"></i>
                                <input type="email" id="regEmail" required class="w-full pl-10 pr-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-1">Password</label>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-3 top-3 text-slate-400"></i>
                                <input type="password" id="regPassword" required minlength="6" class="w-full pl-10 pr-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            </div>
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium mb-1">Konfirmasi Password</label>
                            <div class="relative">
                                <i class="fas fa-check-circle absolute left-3 top-3 text-slate-400"></i>
                                <input type="password" id="regConfirmPassword" required class="w-full pl-10 pr-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 rounded-lg transition-colors">
                            Daftar
                        </button>
                    </form>
                    <p class="mt-6 text-center text-sm">
                        Sudah punya akun? <button onclick="toggleForm('login')" class="text-blue-600 font-semibold hover:underline">Masuk di sini</button>
                    </p>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-white border-t py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <h3 class="font-bold text-slate-700 mb-2">Yor.iAPP &copy; 2026</h3>
            <p class="text-sm text-slate-500 mb-4">Solusi Manajemen Arsip Digital Modern</p>
        </div>
    </footer>

    <script>
        // Ganti dengan URL web app Google Apps Script Anda
        const API_BASE_URL = "https://script.google.com/macros/s/AKfycbwCgn1S5lGbeDFe5_uqTyXWyqk0bhcqvmRELOj1eQFijiibyuez2GPi1V1vidxIWK86/exec"; // <-- ganti!

        window.onload = function() {
            if(localStorage.getItem('yori_user_email')) {
                window.location.href = "dashboard.html";
            }
        }

        function toggleForm(formType) {
            document.getElementById('loginFormContainer').classList.toggle('hidden', formType === 'register');
            document.getElementById('registerFormContainer').classList.toggle('hidden', formType === 'login');
        }

        function showLoader(text) {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('loaderText').innerText = text;
        }

        function hideLoader() {
            document.getElementById('loader').classList.add('hidden');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('logEmail').value;
            const password = document.getElementById('logPassword').value;

            showLoader("Mengautentikasi...");
            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', email, password })
                });
                const res = await response.json();
                hideLoader();
                if(res.success) {
                    localStorage.setItem('yori_user_email', res.user.email);
                    window.location.href = "dashboard.html";
                } else {
                    Swal.fire({ icon: 'error', title: 'Gagal', text: res.message });
                }
            } catch(err) {
                hideLoader();
                Swal.fire({ icon: 'error', title: 'Error', text: 'Koneksi gagal.' });
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const data = {
                username: document.getElementById('regUsername').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            };
            const confirmPass = document.getElementById('regConfirmPassword').value;

            if (data.password !== confirmPass) {
                Swal.fire({ icon: 'warning', title: 'Perhatian', text: 'Password dan Konfirmasi tidak cocok!' });
                return;
            }

            showLoader("Mendaftarkan akun...");
            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'register', ...data })
                });
                const res = await response.json();
                hideLoader();
                if(res.success) {
                    Swal.fire({ icon: 'success', title: 'Berhasil', text: res.message }).then(() => {
                        document.getElementById('registerForm').reset();
                        toggleForm('login');
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Gagal', text: res.message });
                }
            } catch(err) {
                hideLoader();
                Swal.fire({ icon: 'error', title: 'Error', text: 'Koneksi gagal.' });
            }
        }
    </script>
</body>
</html>
